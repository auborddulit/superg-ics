name: Generate SuperG ICS

on:
  schedule:
    - cron: '0 5 * * *'   # tous les jours à 5h UTC (6h Paris hiver, 7h été)
  workflow_dispatch:        # permet de lancer manuellement depuis GitHub

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # nécessaire pour committer le .ics

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate ICS
        env:
          SUPERG_EMAIL:    ${{ secrets.SUPERG_EMAIL }}
          SUPERG_PASSWORD: ${{ secrets.SUPERG_PASSWORD }}
        run: python3 generate.py

      - name: Commit & push ICS
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add superg_reservations.ics
          git diff --cached --quiet || git commit -m "Update ICS $(date -u +%Y-%m-%d)"
          git push
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
